name: DBT CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DBT_PROFILES_DIR: ./

jobs:
  # ── Job 1: Run on Pull Request ──
  dbt-ci:
    name: DBT CI - Test changed models
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for state comparison

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dbt-snowflake
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install DBT
        run: |
          pip install dbt-snowflake==1.7.0
          dbt --version

      - name: Create profiles.yml
        run: |
          cat > profiles.yml << EOF
          airbnb_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: AIRBNB_WH
                database: BRONZE
                schema: AIRBNB_CI
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: DBT deps
        run: dbt deps

      - name: DBT compile
        run: dbt compile --target ci

      - name: DBT run (changed models only)
        run: |
          dbt run \
            --select state:modified+ \
            --defer \
            --state ./target \
            --target ci

      - name: DBT test (changed models only)
        run: |
          dbt test \
            --select state:modified+ \
            --defer \
            --state ./target \
            --target ci

  # ── Job 2: Deploy on merge to main ──
  dbt-deploy:
    name: DBT Deploy - Run full pipeline on prod
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DBT
        run: pip install dbt-snowflake==1.7.0

      - name: Create profiles.yml
        run: |
          cat > profiles.yml << EOF
          airbnb_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: AIRBNB_WH
                database: BRONZE
                schema: AIRBNB
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: DBT deps
        run: dbt deps

      - name: DBT snapshot
        run: dbt snapshot --target prod

      - name: DBT run
        run: dbt run --target prod

      - name: DBT test
        run: dbt test --target prod

      - name: Upload DBT artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dbt-artifacts
          path: |
            target/manifest.json
            target/run_results.json
